services:
  # Backend Web Service
  - type: web
    name: nexus-backend
    runtime: node
    plan: starter
    region: oregon
    buildCommand: npm install
    startCommand: node server.js
    rootDir: nexus-backend
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5001
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        value: https://nexusconnect-brown.vercel.app
      - key: GEMINI_API_KEY
        sync: false
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false

  # Frontend Static Site
  - type: web
    name: nexus-frontend
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    rootDir: Nexus-main
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://nexus-backend-iini.onrender.com/api
      - key: VITE_GOOGLE_CLIENT_ID
        value: 584779340324-vl3pqpo7kr6dv98jg5fsnimk4a48t5ie.apps.googleusercontent.com
