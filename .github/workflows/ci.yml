name: Nexus CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  frontend-build-and-lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./Nexus-main
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js 20.x
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
        cache-dependency-path: './Nexus-main/package-lock.json'
        
    - name: Install dependencies
      run: npm ci || npm install
      
    - name: Run Linter
      run: npm run lint
      
    - name: Build Frontend
      run: npm run build

  backend-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./nexus-backend
        
    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js 20.x
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
        cache-dependency-path: './nexus-backend/package-lock.json'
        
    - name: Install dependencies
      run: npm ci || npm install
      
    - name: Run Backend Tests
      run: npm test
      env:
        NODE_ENV: test
        JWT_SECRET: testing_secret
        GEMINI_API_KEY: testing_key
        MONGODB_URI: mongodb://localhost:27017/test_db
