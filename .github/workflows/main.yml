name: Nexus CI Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:6.0
        ports:
          - 27017:27017

    steps:
    - uses: actions/checkout@v3

    - name: Use Node.js 18.x
      uses: actions/setup-node@v3
      with:
        node-version: '18.x'
        cache: 'npm'
        cache-dependency-path: 'nexus-backend/package-lock.json'

    - name: Install Backend Dependencies
      working-directory: ./nexus-backend
      run: npm ci

    - name: Run Backend Tests
      working-directory: ./nexus-backend
      run: npm test
      env:
        MONGODB_URI: mongodb://localhost:27017/nexus_test
        JWT_SECRET: ci_test_secret_key

